            <!-- ==================== PASSWORD ==================== -->
            <div id="password" class="tool-content bg-slate-800 rounded-lg p-6 sm:p-8 border border-slate-700" style="display:none;">
                <h2 class="text-xl font-bold mb-6 text-white">🔒 Password Generator</h2>
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-2">Length: <span id="pwLenDisplay" class="text-white font-mono">16</span></label>
                            <input type="range" id="pwLen" min="4" max="128" value="16" oninput="document.getElementById('pwLenDisplay').textContent=this.value; generatePasswords()" class="w-full accent-blue-500">
                        </div>
                        <div class="space-y-2 text-sm text-gray-300">
                            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="pwUpper" checked onchange="generatePasswords()" class="accent-blue-500"> Uppercase (A–Z)</label>
                            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="pwLower" checked onchange="generatePasswords()" class="accent-blue-500"> Lowercase (a–z)</label>
                            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="pwNumbers" checked onchange="generatePasswords()" class="accent-blue-500"> Numbers (0–9)</label>
                            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="pwSymbols" onchange="generatePasswords()" class="accent-blue-500"> Symbols (!@#$%...)</label>
                            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="pwNoAmbiguous" onchange="generatePasswords()" class="accent-blue-500"> Exclude ambiguous (0, O, l, 1, I)</label>
                        </div>
                        <div class="flex items-center gap-3">
                            <label class="text-xs text-gray-400">Count:</label>
                            <input type="number" id="pwCount" value="5" min="1" max="20" oninput="generatePasswords()" class="w-20 bg-slate-700 text-white px-3 py-2 rounded text-sm border border-slate-600 outline-none focus:border-blue-400">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-2">Generated Passwords</label>
                        <textarea id="pwOutput" readonly class="w-full h-52 bg-slate-700 text-white px-4 py-3 rounded border border-slate-600 font-mono text-sm resize-none"></textarea>
                        <div class="flex gap-2 mt-2">
                            <button onclick="generatePasswords()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded transition text-sm">Regenerate</button>
                            <button onclick="copyToClipboard('pwOutput')" class="bg-slate-600 hover:bg-slate-500 px-4 py-2 rounded transition text-sm">Copy All</button>
                        </div>
                    </div>
                </div>
            </div>
