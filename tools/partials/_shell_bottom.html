    <script>
        const toggle = document.getElementById('navToggle');
        const menu = document.getElementById('mobileMenu');
        const iconMenu = document.getElementById('iconMenu');
        const iconClose = document.getElementById('iconClose');
        toggle.addEventListener('click', () => {
            const open = menu.classList.toggle('hidden');
            iconMenu.classList.toggle('hidden', !open);
            iconClose.classList.toggle('hidden', open);
        });
        const mobilePicker = document.getElementById('mobilePicker');
        const origShowTool = window.showTool;
        window.showTool = function(toolName) {
            origShowTool(toolName);
            if (mobilePicker.value !== toolName) mobilePicker.value = toolName;
        };
    </script>
